<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f3;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;color:#1a1a1a;min-height:100vh;padding:0 0 4rem}
.w{max-width:1020px;margin:0 auto;padding:2rem 1.5rem}
.top-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.report-title{font-size:11px;font-weight:500;color:#888;letter-spacing:.08em;text-transform:uppercase}
.tab-bar{display:flex;border:1px solid #d8d8d4;border-radius:8px;overflow:hidden}
.tab{padding:7px 22px;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;color:#666;border-right:1px solid #d8d8d4}
.tab:last-child{border-right:none}
.tab.active{background:#1a1a1a;color:#fff}
.tab:hover:not(.active){background:#eeeeed}
.panel{display:none}.panel.active{display:block}

.month-header{display:flex;align-items:baseline;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
.month-title{font-size:20px;font-weight:500;color:#1a1a1a}
.tg-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;background:#ebebea;color:#666}
.achieve-pct{font-size:13px;font-weight:500}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:1rem}
.kpi{background:#ebebea;border-radius:8px;padding:12px 14px}
.kpi.accent{background:#fff;border:1px solid #d0d0cc}
.kpi-label{font-size:10px;color:#888;font-weight:500;letter-spacing:.04em;margin-bottom:5px}
.kpi-val{font-size:20px;font-weight:500;color:#1a1a1a}
.kpi-sub{font-size:10px;color:#aaa;margin-top:2px}

.prog-wrap{margin-bottom:1.25rem}
.prog-labels{display:flex;justify-content:space-between;font-size:10px;color:#aaa;margin-bottom:4px}
.progress-bar{height:8px;background:#ddddd8;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px}

.section-title{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:#aaa;margin-bottom:8px;margin-top:1.25rem}

.category-block{border:1px solid #ddddd8;border-radius:12px;background:#fff;margin-bottom:10px;overflow:hidden}
.cat-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f5f5f3;border-bottom:1px solid #ddddd8;cursor:pointer;user-select:none}
.cat-toggle{font-size:11px;color:#aaa;transition:transform .2s;margin-left:4px}
.cat-toggle.open{transform:rotate(180deg)}
.cat-body{display:none}.cat-body.open{display:block}
.cat-meta{font-size:10px;color:#aaa}
.cat-amt{font-size:12px;font-weight:500;color:#1a1a1a}

.tbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.tbl th{padding:7px 10px;text-align:left;font-weight:500;font-size:10px;color:#aaa;letter-spacing:.03em;border-bottom:1px solid #ddddd8;background:#f5f5f3}
.tbl td{padding:7px 10px;color:#1a1a1a;border-bottom:1px solid #eeeee8;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#f9f9f7}
.num{text-align:right!important}
.summary-row td{font-weight:500;background:#f5f5f3!important}

.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:99px;font-weight:500;white-space:nowrap}
.b-preorder{background:#E6F1FB;color:#0C447C}
.b-preorder-out{background:#EAF3DE;color:#3B6D11}
.b-popup{background:#FAEEDA;color:#854F0B}
.b-new{background:#EEEDFE;color:#3C3489}
.b-reorder{background:#F1EFE8;color:#5F5E5A}
.b-b2b{background:#FCEBEB;color:#A32D2D}

.sellthru-bar{display:flex;align-items:center;gap:5px}
.st-bg{flex:1;height:3px;background:#ddddd8;border-radius:2px;min-width:24px}
.st-fill{height:3px;border-radius:2px;background:#378ADD}
.dash{color:#ccc}
.note-txt{font-size:10px;color:#aaa;font-style:italic}

.chart-area{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.chart-box{border:1px solid #ddddd8;border-radius:12px;padding:14px;background:#fff}
.legend-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:#aaa}
.leg-sq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.table-wrap{border:1px solid #ddddd8;border-radius:12px;background:#fff;overflow:hidden;margin-bottom:1.25rem}
</style>

/* ── helpers ─────────────────────────── */
function fmtM(v){
  if(v===null||v===undefined) return '<span class="dash">—</span>';
  return v.toFixed(1)+'M';
}
function fmtQty(v){
  if(!v&&v!==0) return '<span class="dash">—</span>';
  return Number(v).toLocaleString();
}
function stBar(v){
  if(v===null||v===undefined) return '<span class="dash">—</span>';
  const pct=Math.round(v*100);
  return `<div class="sellthru-bar"><div class="st-bg"><div class="st-fill" style="width:${pct}%"></div></div><span style="font-size:10px;min-width:28px">${pct}%</span></div>`;
}
function badgeCls(k){
  return{preorder:'b-preorder','preorder-out':'b-preorder-out',popup:'b-popup',new:'b-new',reorder:'b-reorder',b2b:'b-b2b'}[k]||'b-new';
}
function badge(k,l){return `<span class="badge ${badgeCls(k)}">${l}</span>`}

/* ── month panel ─────────────────────── */
function buildMonth(m){
  const d=D[m];
  const pct=d.tg?Math.round(d.sales/d.tg*100):null;
  const pctColor=pct===null?'#888':pct>=100?'#3B6D11':pct>=60?'#854F0B':'#A32D2D';

  let h=`
  <div class="month-header">
    <span class="month-title">${m}월</span>
    <span class="tg-badge">TG ${d.tg}억</span>
    ${pct!==null?`<span class="achieve-pct" style="color:${pctColor}">신제품 매출 ${pct}% 달성 예상</span>`:''}
  </div>
  <div class="kpi-grid">
    <div class="kpi accent">
      <div class="kpi-label">당월 예상 매출액</div>
      <div class="kpi-val" style="color:${pctColor}">${d.sales.toFixed(2)}억</div>
      <div class="kpi-sub">TG ${d.tg}억 대비 ${pct}%</div>
    </div>
    <div class="kpi accent">
      <div class="kpi-label">당월 재고소진 예상</div>
      <div class="kpi-val">${d.stockout.toFixed(2)}억</div>
      <div class="kpi-sub">매출볼륨의 ${d.vol>0?Math.round(d.stockout/d.vol*100):0}% 소진</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">총 매출볼륨 (-vat)</div>
      <div class="kpi-val">${d.vol.toFixed(2)}억</div>
      <div class="kpi-sub">입고 기준</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">총 발주금액 (-vat)</div>
      <div class="kpi-val">${d.order.toFixed(2)}억</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">총 입고수량</div>
      <div class="kpi-val">${d.qty.toLocaleString()}</div>
      <div class="kpi-sub">EA</div>
    </div>
  </div>`;

  const fill=Math.min(pct||0,100);
  h+=`<div class="prog-wrap">
    <div class="prog-labels"><span>0</span><span>${d.sales.toFixed(2)}억 / TG ${d.tg}억</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${fill}%;background:${pctColor}"></div></div>
  </div>`;

  d.cats.forEach(cat=>{
    const catSo=cat.items.reduce((s,r)=>s+(r.so||0),0);
    const catSl=cat.items.reduce((s,r)=>s+(r.sl||0),0);
    const open=['new','popup','b2b','preorder-out'].includes(cat.key);
    h+=`<div class="category-block">
      <div class="cat-header" onclick="toggleCat(this)">
        ${badge(cat.key,cat.label)}
        ${cat.note?`<span class="note-txt" style="margin-left:4px">${cat.note}</span>`:''}
        <span style="flex:1"></span>
        ${cat.key==='b2b'?`<span style="background:#A32D2D;color:#fff;font-size:9px;font-weight:500;padding:2px 8px;border-radius:99px;margin-right:8px">공급률 60% 적용</span>`:''}
        <span class="cat-meta">재고소진 ${catSo.toFixed(1)}M&nbsp;&nbsp;</span>
        <span class="cat-amt">예상매출 ${catSl.toFixed(1)}M</span>
        <span class="cat-toggle ${open?'open':''}">▾</span>
      </div>
      <div class="cat-body ${open?'open':''}">
        <table class="tbl">
          <thead><tr>
            <th style="width:22%">프로젝트명</th>
            <th style="width:6%">출시일</th>
            <th class="num" style="width:4%">SKU</th>
            <th class="num" style="width:7%">입고수량</th>
            <th class="num" style="width:8%">발주(M)</th>
            <th class="num" style="width:9%">매출볼륨(M)</th>
            <th style="width:11%">예상 셀스루</th>
            <th class="num" style="width:9%">재고소진(M)</th>
            <th class="num" style="width:9%">예상매출(M)</th>
            <th style="width:15%">비고</th>
          </tr></thead><tbody>`;
    cat.items.forEach(r=>{
      h+=`<tr>
        <td>${r.n}</td>
        <td style="font-size:10px;color:#aaa">${r.d||''}</td>
        <td class="num">${r.sku!==null&&r.sku!==undefined?r.sku:'<span class="dash">—</span>'}</td>
        <td class="num">${fmtQty(r.qty)}</td>
        <td class="num">${fmtM(r.order)}</td>
        <td class="num">${fmtM(r.vol)}</td>
        <td>${stBar(r.st)}</td>
        <td class="num">${fmtM(r.so)}</td>
        <td class="num" style="font-weight:500">${fmtM(r.sl)}</td>
        <td class="note-txt">${r.note||''}</td>
      </tr>`;
    });
    h+=`<tr class="summary-row">
      <td colspan="7" style="text-align:right;font-size:10px;color:#aaa">${cat.label} 소계</td>
      <td class="num">${catSo.toFixed(1)}M</td>
      <td class="num">${catSl.toFixed(1)}M</td>
      <td></td>
    </tr></tbody></table></div></div>`;
  });
  return h;
}

/* ── all panel ───────────────────────── */
function buildAll(){
  const ms=['4','5','6'], labels=['4월','5월','6월'];
  const salesArr=ms.map(m=>D[m].sales);
  const soArr=ms.map(m=>D[m].stockout);
  const volArr=ms.map(m=>D[m].vol);
  const tgArr=ms.map(m=>D[m].tg||0);
  const gc='rgba(0,0,0,0.06)', tc='rgba(0,0,0,0.4)';
  const catKeys=['preorder','preorder-out','popup','new','reorder','b2b'];
  const catNames={preorder:'프리오더 예정','preorder-out':'프리오더 출고',popup:'팝업',new:'신제품',reorder:'재발주',b2b:'B2B'};

  const totalSales=salesArr.reduce((a,b)=>a+b,0);
  const totalSo=soArr.reduce((a,b)=>a+b,0);
  const totalVol=volArr.reduce((a,b)=>a+b,0);
  const totalTg=tgArr.reduce((a,b)=>a+b,0);

  let h=`
  <div class="month-header"><span class="month-title">2026 Q1 전체 요약</span><span class="tg-badge">4~6월 합산</span></div>
  <div class="kpi-grid">
    <div class="kpi accent"><div class="kpi-label">예상 매출 합계</div><div class="kpi-val">${totalSales.toFixed(2)}억</div><div class="kpi-sub">4~6월 누적</div></div>
    <div class="kpi accent"><div class="kpi-label">재고소진 합계</div><div class="kpi-val">${totalSo.toFixed(2)}억</div><div class="kpi-sub">4~6월 누적</div></div>
    <div class="kpi"><div class="kpi-label">매출볼륨 합계</div><div class="kpi-val">${totalVol.toFixed(2)}억</div><div class="kpi-sub">입고 기준</div></div>
    <div class="kpi"><div class="kpi-label">TG 합계</div><div class="kpi-val">${totalTg.toFixed(1)}억</div><div class="kpi-sub">4월 21억 / 5월 33.6억 / 6월 40.5억</div></div>
  </div>
  <div class="chart-area">
    <div class="chart-box">
      <div class="legend-row">
        <span class="leg"><span class="leg-sq" style="background:rgba(55,138,221,0.35)"></span>TG</span>
        <span class="leg"><span class="leg-sq" style="background:#639922"></span>예상 매출액</span>
        <span class="leg"><span class="leg-sq" style="background:rgba(239,159,39,0.7)"></span>재고소진</span>
      </div>
      <div style="position:relative;height:200px"><canvas id="c-tg"></canvas></div>
    </div>
    <div class="chart-box">
      <div class="legend-row">
        <span class="leg"><span class="leg-sq" style="background:rgba(127,119,221,0.35)"></span>총 매출볼륨</span>
        <span class="leg"><span class="leg-sq" style="background:#639922"></span>예상 매출액</span>
      </div>
      <div style="position:relative;height:200px"><canvas id="c-vol"></canvas></div>
    </div>
  </div>
  <div class="section-title">카테고리별 예상 매출 3개월 비교 (단위: 억)</div>
  <div class="table-wrap"><table class="tbl">
    <thead><tr>
      <th>구분</th>
      <th class="num">4월 재고소진</th><th class="num">4월 예상매출</th>
      <th class="num">5월 재고소진</th><th class="num">5월 예상매출</th>
      <th class="num">6월 재고소진</th><th class="num">6월 예상매출</th>
      <th class="num">합계 예상매출</th>
    </tr></thead><tbody>`;

  catKeys.forEach(ck=>{
    const row=ms.map(m=>{
      const c=D[m].cats.find(c=>c.key===ck);
      if(!c) return{so:0,sl:0};
      return{so:c.items.reduce((s,r)=>s+(r.so||0),0)/100,
             sl:c.items.reduce((s,r)=>s+(r.sl||0),0)/100};
    });
    const total=row.reduce((s,r)=>s+r.sl,0);
    if(total===0&&row.every(r=>r.so===0)) return;
    h+=`<tr>
      <td>${badge(ck,catNames[ck])}</td>
      ${row.map(r=>`<td class="num">${r.so.toFixed(2)}</td><td class="num" style="font-weight:500">${r.sl.toFixed(2)}</td>`).join('')}
      <td class="num" style="font-weight:500">${total.toFixed(2)}</td>
    </tr>`;
  });

  h+=`<tr class="summary-row">
    <td>합계</td>
    ${ms.map(m=>`<td class="num">${D[m].stockout.toFixed(2)}</td><td class="num">${D[m].sales.toFixed(2)}</td>`).join('')}
    <td class="num">${totalSales.toFixed(2)}</td>
  </tr></tbody></table></div>`;

  document.getElementById('pall').innerHTML=h;

  setTimeout(()=>{
    new Chart(document.getElementById('c-tg'),{type:'bar',
      data:{labels,datasets:[
        {label:'TG',data:tgArr,backgroundColor:'rgba(55,138,221,0.25)',borderColor:'#378ADD',borderWidth:1.5,borderRadius:3},
        {label:'예상 매출액',data:salesArr,backgroundColor:'#639922',borderRadius:3},
        {label:'재고소진',data:soArr,backgroundColor:'rgba(239,159,39,0.7)',borderRadius:3},
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{color:gc},ticks:{color:tc}},
                y:{grid:{color:gc},ticks:{color:tc,callback:v=>v.toFixed(1)+'억'}}}}
    });
    new Chart(document.getElementById('c-vol'),{type:'bar',
      data:{labels,datasets:[
        {label:'총 매출볼륨',data:volArr,backgroundColor:'rgba(127,119,221,0.3)',borderColor:'#7F77DD',borderWidth:1.5,borderRadius:3},
        {label:'예상 매출액',data:salesArr,backgroundColor:'#639922',borderRadius:3},
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{color:gc},ticks:{color:tc}},
                y:{grid:{color:gc},ticks:{color:tc,callback:v=>v.toFixed(1)+'억'}}}}
    });
  },80);
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>{
    const map={'4':'4월','5':'5월','6':'6월','all':'전체'};
    b.classList.toggle('active',b.textContent===map[t]);
  });
  ['4','5','6','all'].forEach(k=>document.getElementById('p'+k).classList.toggle('active',k===t));
  if(t==='all'&&!document.getElementById('pall').innerHTML) buildAll();
}

function toggleCat(el){
  el.querySelector('.cat-toggle').classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

['4','5','6'].forEach(m=>{document.getElementById('p'+m).innerHTML=buildMonth(m);});
</script>
</body>
